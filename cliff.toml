[changelog]
body = """
{% if version %}\
    ## {{ version }} - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## Unreleased
{% endif %}\
{% if commits | length == 0 %}
    This release has no user-facing feature or bug-fix entries.
{% else %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim }}
    {% for commit in commits %}
        - {% if commit.breaking %}**Breaking change:** {% endif %}\
            {% if commit.scope %}**{{ commit.scope }}:** {% endif %}\
            {{ commit.message | upper_first }} \
            ([{{ commit.id | truncate(length=7, end="") }}](https://github.com/unDefFtr/RouterView/commit/{{ commit.id }}))\
    {% endfor %}
{% endfor %}\
{% endif %}\
{% if version and previous.version %}
    **Full Changelog:** https://github.com/unDefFtr/RouterView/compare/{{ previous.version }}...{{ version }}
{% endif %}
"""
footer = """
<!-- generated by git-cliff -->
"""
trim = true
render_always = true

[git]
conventional_commits = true
filter_unconventional = true
require_conventional = false
split_commits = false
commit_preprocessors = [
  { pattern = '\(#([0-9]+)\)', replace = "([#${1}](https://github.com/unDefFtr/RouterView/issues/${1}))" },
  { pattern = 'RUSTSEC-([0-9]{4})-([0-9]{4})', replace = "[RUSTSEC-${1}-${2}](https://rustsec.org/advisories/RUSTSEC-${1}-${2}.html)" },
]
commit_parsers = [
  { field = "breaking", pattern = "true", group = "<!-- 0 -->Breaking Changes" },
  { message = "^feat", group = "<!-- 1 -->Features and Improvements" },
  { message = "^perf", group = "<!-- 1 -->Features and Improvements" },
  { message = "^fix", group = "<!-- 2 -->Bug Fixes" },
  { message = "^security", group = "<!-- 2 -->Bug Fixes" },
  { message = "^revert", group = "<!-- 2 -->Bug Fixes" },
  { message = "^docs?", skip = true },
  { message = "^refactor", skip = true },
  { message = "^style", skip = true },
  { message = "^test", skip = true },
  { message = "^chore", skip = true },
  { message = "^ci", skip = true },
  { message = "^build", skip = true },
  { message = "^merge", skip = true },
]
protect_breaking_commits = true
filter_commits = false
fail_on_unmatched_commit = true
tag_pattern = '^v[0-9]+\.[0-9]+\.[0-9]+(?:-[0-9A-Za-z.-]+)?(?:\+[0-9A-Za-z.-]+)?$'
use_branch_tags = false
topo_order = true
topo_order_commits = true
sort_commits = "oldest"
