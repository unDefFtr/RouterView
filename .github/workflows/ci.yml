name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: 1.91.1
          components: clippy,rustfmt
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: . -> target
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Lint
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      - name: Test
        run: cargo test --workspace --all-targets --all-features --locked

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Enforce pnpm lockfile
        run: |
          test -f pnpm-lock.yaml
          unexpected="$(find .. \
            -type d \( -name .git -o -name node_modules \) -prune -o \
            -type f \( -name package-lock.json -o -name npm-shrinkwrap.json -o -name yarn.lock \) \
            -print)"
          if [ -n "$unexpected" ]; then
            printf 'unsupported lockfile(s):\n%s\n' "$unexpected" >&2
            exit 1
          fi
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.24.0
          run_install: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck
      - name: Test
        run: pnpm test --run
      - name: Build
        run: pnpm build

  compose:
    name: Compose configuration
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Create ephemeral build secret
        run: |
          mkdir -p secrets
          head -c 32 /dev/urandom > secrets/routerview_master_key
          chmod 0444 secrets/routerview_master_key
      - name: Validate Compose model
        run: docker compose --env-file .env.compose.example config --quiet
      - name: Build Caddy runtime image
        run: docker build --target caddy-runtime --tag routerview-caddy:ci .
      - name: Verify Caddy image delegates health to Compose
        run: >-
          docker image inspect routerview-caddy:ci
          --format '{{json .Config.Healthcheck}}'
          | grep --fixed-strings --line-regexp 'null'
      - name: Validate hardened Caddy runtime
        run: >-
          docker run --rm
          --read-only
          --cap-drop ALL
          --security-opt no-new-privileges:true
          --sysctl net.ipv4.ip_unprivileged_port_start=0
          --tmpfs /tmp:rw,noexec,nosuid,nodev,size=16m,uid=10001,gid=10001,mode=0700
          --tmpfs /data:rw,nosuid,nodev,uid=10001,gid=10001,mode=0750
          --tmpfs /config:rw,nosuid,nodev,uid=10001,gid=10001,mode=0750
          -e ROUTERVIEW_DOMAIN=routerview.local
          --entrypoint caddy
          routerview-caddy:ci
          validate --config /etc/caddy/Caddyfile --adapter caddyfile
      - name: Start Compose deployment
        env:
          ROUTERVIEW_HTTP_BIND: 127.0.0.1
          ROUTERVIEW_HTTPS_BIND: 127.0.0.1
        run: >-
          docker compose --env-file .env.compose.example
          up --detach --build --wait --wait-timeout 180
      - name: Verify Compose deployment
        run: |
          set -euo pipefail
          docker compose --env-file .env.compose.example ps --format json \
            | jq --slurp --exit-status \
              'length == 2 and all(.[]; .Health == "healthy")' >/dev/null

          backend_id="$(docker compose --env-file .env.compose.example ps -q backend)"
          caddy_id="$(docker compose --env-file .env.compose.example ps -q caddy)"
          docker inspect "$backend_id" | jq --exit-status '
            .[0] |
            .Config.User == "10001:10001" and
            .HostConfig.ReadonlyRootfs == true and
            .HostConfig.CapDrop == ["ALL"] and
            .HostConfig.CapAdd == ["CAP_NET_RAW"] and
            .HostConfig.SecurityOpt == ["no-new-privileges:true"] and
            .HostConfig.PortBindings == {} and
            (.NetworkSettings.Networks | keys | sort) ==
              ["routerview_app", "routerview_router_access"]
          ' >/dev/null
          docker inspect "$caddy_id" | jq --exit-status '
            .[0] |
            .Config.User == "10001:10001" and
            .HostConfig.ReadonlyRootfs == true and
            .HostConfig.CapDrop == ["ALL"] and
            .HostConfig.CapAdd == null and
            .HostConfig.SecurityOpt == ["no-new-privileges:true"] and
            .HostConfig.PortBindings == {
              "80/tcp": [{"HostIp": "127.0.0.1", "HostPort": "80"}],
              "443/tcp": [{"HostIp": "127.0.0.1", "HostPort": "443"}]
            } and
            (.NetworkSettings.Networks | keys | sort) ==
              ["routerview_app", "routerview_edge"]
          ' >/dev/null

          docker compose --env-file .env.compose.example cp \
            caddy:/data/caddy/pki/authorities/local/root.crt \
            /tmp/routerview-local-ca.crt
          health_code="$(curl --silent --show-error \
            --resolve routerview.local:443:127.0.0.1 \
            --cacert /tmp/routerview-local-ca.crt \
            --output /tmp/routerview-health.json \
            --write-out '%{http_code}' \
            https://routerview.local/api/health)"
          test "$health_code" = 200
          jq --exit-status \
            '.status == "ok" and .version == "0.2.0"' \
            /tmp/routerview-health.json >/dev/null

          redirect_code="$(curl --silent --show-error \
            --header 'Host: routerview.local' \
            --dump-header /tmp/routerview-redirect.headers \
            --output /dev/null \
            --write-out '%{http_code}' \
            http://127.0.0.1/)"
          test "$redirect_code" = 308
          ! grep --ignore-case '^Server:' /tmp/routerview-redirect.headers
          redirect_location="$(sed -n 's/^Location: //Ip' \
            /tmp/routerview-redirect.headers | tr -d '\r')"
          test "$redirect_location" = 'https://routerview.local/'
      - name: Stop Compose deployment
        if: always()
        run: >-
          docker compose --env-file .env.compose.example
          down --volumes --remove-orphans

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.24.0
          run_install: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Audit production frontend dependencies
        working-directory: frontend
        run: pnpm audit --prod --audit-level=high

  dependency-inventory:
    name: Dependency inventory
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: 1.91.1
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.24.0
          run_install: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Verify third-party license texts
        run: |
          pnpm --dir frontend run licenses:test
          pnpm --dir frontend run licenses:bundle
          test -s third-party-licenses/cargo/DEPENDENCIES.md
          test -s third-party-licenses/pnpm/DEPENDENCIES.md
      - name: Generate dependency inventory
        run: |
          cargo metadata --locked --format-version 1 > cargo-metadata.json
          pnpm --dir frontend licenses list --json > pnpm-licenses.json
          node scripts/generate-third-party-notices.mjs \
            cargo-metadata.json pnpm-licenses.json THIRD-PARTY-LICENSES.md
          test -s THIRD-PARTY-LICENSES.md

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITLEAKS_ENABLE_COMMENTS: "false"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  source-sbom:
    name: Source SBOM
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: spdx-json
          output-file: routerview-source.spdx.json
          upload-artifact: true
          upload-release-assets: false
