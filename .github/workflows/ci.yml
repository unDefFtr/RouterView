name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.91.1
          components: clippy,rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Lint
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      - name: Test
        run: cargo test --workspace --all-targets --all-features --locked

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Enforce pnpm lockfile
        run: |
          test -f pnpm-lock.yaml
          unexpected="$(find .. \
            -type d \( -name .git -o -name node_modules \) -prune -o \
            -type f \( -name package-lock.json -o -name npm-shrinkwrap.json -o -name yarn.lock \) \
            -print)"
          if [ -n "$unexpected" ]; then
            printf 'unsupported lockfile(s):\n%s\n' "$unexpected" >&2
            exit 1
          fi
      - uses: pnpm/action-setup@v4
        with:
          version: 10.24.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck
      - name: Test
        run: pnpm test --run
      - name: Build
        run: pnpm build

  compose:
    name: Compose configuration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create ephemeral build secret
        run: |
          mkdir -p secrets
          head -c 32 /dev/urandom > secrets/routerview_master_key
          chmod 0444 secrets/routerview_master_key
      - name: Validate Compose model
        run: docker compose --env-file .env.compose.example config --quiet
      - name: Validate Caddy configuration
        run: >-
          docker run --rm
          -e ROUTERVIEW_DOMAIN=routerview.local
          -v "$PWD/deploy/Caddyfile:/etc/caddy/Caddyfile:ro"
          caddy:2.10.2-alpine
          caddy validate --config /etc/caddy/Caddyfile --adapter caddyfile

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: pnpm/action-setup@v4
        with:
          version: 10.24.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Audit production frontend dependencies
        working-directory: frontend
        run: pnpm audit --prod --audit-level=high

  dependency-inventory:
    name: Dependency inventory
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.91.1
      - uses: pnpm/action-setup@v4
        with:
          version: 10.24.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Generate dependency inventory
        run: |
          cargo metadata --locked --format-version 1 > cargo-metadata.json
          pnpm --dir frontend licenses list --json > pnpm-licenses.json
          node scripts/generate-third-party-notices.mjs \
            cargo-metadata.json pnpm-licenses.json THIRD-PARTY-LICENSES.md
          test -s THIRD-PARTY-LICENSES.md

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  source-sbom:
    name: Source SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: routerview-source.spdx.json
          upload-artifact: true
