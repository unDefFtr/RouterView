name: Release

on:
  push:
    tags:
      - "v*"

permissions: {}

jobs:
  tag-provenance:
    name: Verify tag provenance
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false
      - name: Require tag commit on origin/main
        run: |
          test "$GITHUB_REF_TYPE" = "tag"
          git show-ref --verify --quiet refs/remotes/origin/main
          tag_commit="$(git rev-parse --verify 'HEAD^{commit}')"
          if ! git merge-base --is-ancestor "$tag_commit" refs/remotes/origin/main; then
            echo "Tag commit $tag_commit is not reachable from origin/main" >&2
            exit 1
          fi

  dependency-audit:
    name: Dependency audit
    needs: tag-provenance
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.24.0
          run_install: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Audit production frontend dependencies
        working-directory: frontend
        run: pnpm audit --prod --audit-level=high

  secret-scan:
    name: Secret scan
    needs: tag-provenance
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Scan complete tagged history
        run: gitleaks detect --source . --redact --verbose

  deployment-validation:
    name: Deployment configuration
    needs: tag-provenance
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Create ephemeral build secret
        run: |
          mkdir -p secrets
          head -c 32 /dev/urandom > secrets/routerview_master_key
          chmod 0444 secrets/routerview_master_key
      - name: Validate Compose model
        run: docker compose --env-file .env.compose.example config --quiet
      - name: Validate Caddy configuration
        run: >-
          docker run --rm
          -e ROUTERVIEW_DOMAIN=routerview.local
          -v "$PWD/deploy/Caddyfile:/etc/caddy/Caddyfile:ro"
          caddy:2.10.2-alpine
          caddy validate --config /etc/caddy/Caddyfile --adapter caddyfile

  artifacts:
    name: Validate and build amd64 artifacts
    needs: [tag-provenance, dependency-audit, secret-scan, deployment-validation]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: 1.91.1
          components: clippy,rustfmt
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.24.0
          run_install: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Verify release version
        run: |
          cargo metadata --locked --no-deps --format-version 1 > release-cargo-metadata.json
          node scripts/verify-release-version.mjs \
            "$GITHUB_REF_NAME" release-cargo-metadata.json frontend/package.json
          test "$(uname -m)" = "x86_64"
      - name: Verify backend
        run: |
          cargo fmt --all --check
          cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
          cargo test --workspace --all-targets --all-features --locked
          cargo build --locked --release --package routerview-backend
      - name: Verify and build frontend
        working-directory: frontend
        run: |
          pnpm test --run
          pnpm build
      - name: Generate dependency inventory
        run: |
          cargo metadata --locked --format-version 1 > cargo-metadata.json
          pnpm --dir frontend licenses list --json > pnpm-licenses.json
          node scripts/generate-third-party-notices.mjs \
            cargo-metadata.json pnpm-licenses.json THIRD-PARTY-LICENSES.md
      - name: Bundle third-party license texts
        run: |
          pnpm --dir frontend run licenses:test
          pnpm --dir frontend run licenses:release
          test -s release/backend/third-party-licenses/cargo/DEPENDENCIES.md
          test -s release/frontend/third-party-licenses/pnpm/DEPENDENCIES.md
      - name: Assemble release directories
        run: |
          install -d release/backend release/frontend
          install -m 0755 target/release/routerview-backend release/backend/
          cp LICENSE README.md THIRD-PARTY-LICENSES.md release/backend/
          cp -R docs release/backend/docs
          cp -R frontend/dist/. release/frontend/
          cp LICENSE THIRD-PARTY-LICENSES.md release/frontend/
      - name: Generate backend artifact SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: release/backend
          format: spdx-json
          output-file: routerview-backend-${{ github.ref_name }}-linux-amd64.spdx.json
          upload-artifact: false
          upload-release-assets: false
      - name: Generate frontend artifact SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: release/frontend
          format: spdx-json
          output-file: routerview-frontend-${{ github.ref_name }}.spdx.json
          upload-artifact: false
          upload-release-assets: false
      - name: Package artifacts
        run: |
          tar -C release/backend -czf routerview-backend-${{ github.ref_name }}-linux-amd64.tar.gz .
          tar -C release/frontend -czf routerview-frontend-${{ github.ref_name }}.tar.gz .
          sha256sum \
            routerview-backend-${{ github.ref_name }}-linux-amd64.tar.gz \
            routerview-frontend-${{ github.ref_name }}.tar.gz \
            routerview-backend-${{ github.ref_name }}-linux-amd64.spdx.json \
            routerview-frontend-${{ github.ref_name }}.spdx.json \
            THIRD-PARTY-LICENSES.md \
            > SHA256SUMS
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: routerview-${{ github.ref_name }}-release
          if-no-files-found: error
          retention-days: 7
          path: |
            routerview-backend-${{ github.ref_name }}-linux-amd64.tar.gz
            routerview-frontend-${{ github.ref_name }}.tar.gz
            routerview-backend-${{ github.ref_name }}-linux-amd64.spdx.json
            routerview-frontend-${{ github.ref_name }}.spdx.json
            THIRD-PARTY-LICENSES.md
            SHA256SUMS

  images:
    name: Publish ${{ matrix.name }} image
    needs: artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: backend
            target: backend-runtime
            image: routerview-backend
          - name: caddy
            target: caddy-runtime
            image: routerview-caddy
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: metadata
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: Dockerfile
          target: ${{ matrix.target }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
          provenance: mode=max
          sbom: true

  release:
    name: Publish GitHub release
    needs: [artifacts, images]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false
      - name: Generate release notes
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4.8.0
        with:
          version: v2.13.1
          config: cliff.toml
          args: --current --strip header --no-exec --output RELEASE_NOTES.md
      - name: Verify release notes
        run: |
          test -s RELEASE_NOTES.md
          grep -Fq "## ${GITHUB_REF_NAME}" RELEASE_NOTES.md
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: routerview-${{ github.ref_name }}-release
          path: release-files
      - name: Verify release artifact checksums
        working-directory: release-files
        run: sha256sum --check SHA256SUMS
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          body_path: RELEASE_NOTES.md
          fail_on_unmatched_files: true
          files: release-files/*
