name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  artifacts:
    name: Validate and build amd64 artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.91.1
          components: clippy,rustfmt
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 10.24.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Verify release version
        run: |
          cargo metadata --locked --no-deps --format-version 1 > release-cargo-metadata.json
          node scripts/verify-release-version.mjs \
            "$GITHUB_REF_NAME" release-cargo-metadata.json frontend/package.json
          test "$(uname -m)" = "x86_64"
      - name: Verify backend
        run: |
          cargo fmt --all --check
          cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
          cargo test --workspace --all-targets --all-features --locked
          cargo build --locked --release --package routerview-backend
      - name: Verify and build frontend
        working-directory: frontend
        run: |
          pnpm test --run
          pnpm build
      - name: Validate Compose model
        run: |
          key_file="$(mktemp)"
          trap 'rm -f "$key_file"' EXIT
          head -c 32 /dev/urandom > "$key_file"
          chmod 0444 "$key_file"
          ROUTERVIEW_MASTER_KEY_SOURCE="$key_file" \
            docker compose --env-file .env.compose.example config --quiet
      - name: Generate dependency inventory
        run: |
          cargo metadata --locked --format-version 1 > cargo-metadata.json
          pnpm --dir frontend licenses list --json > pnpm-licenses.json
          node scripts/generate-third-party-notices.mjs \
            cargo-metadata.json pnpm-licenses.json THIRD-PARTY-LICENSES.md
      - uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: routerview-${{ github.ref_name }}.spdx.json
          upload-artifact: false
      - name: Package artifacts
        run: |
          install -d release/backend release/frontend
          install -m 0755 target/release/routerview-backend release/backend/
          cp LICENSE README.md THIRD-PARTY-LICENSES.md release/backend/
          cp -R docs release/backend/docs
          cp -R frontend/dist/. release/frontend/
          cp LICENSE THIRD-PARTY-LICENSES.md release/frontend/
          tar -C release/backend -czf routerview-backend-${{ github.ref_name }}-linux-amd64.tar.gz .
          tar -C release/frontend -czf routerview-frontend-${{ github.ref_name }}.tar.gz .
          sha256sum \
            routerview-backend-${{ github.ref_name }}-linux-amd64.tar.gz \
            routerview-frontend-${{ github.ref_name }}.tar.gz \
            routerview-${{ github.ref_name }}.spdx.json \
            THIRD-PARTY-LICENSES.md \
            > SHA256SUMS
      - uses: actions/upload-artifact@v4
        with:
          name: routerview-${{ github.ref_name }}-release
          if-no-files-found: error
          retention-days: 7
          path: |
            routerview-backend-${{ github.ref_name }}-linux-amd64.tar.gz
            routerview-frontend-${{ github.ref_name }}.tar.gz
            routerview-${{ github.ref_name }}.spdx.json
            THIRD-PARTY-LICENSES.md
            SHA256SUMS

  images:
    name: Publish ${{ matrix.name }} image
    needs: artifacts
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: backend
            target: backend-runtime
            image: routerview-backend
          - name: caddy
            target: caddy-runtime
            image: routerview-caddy
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: ${{ matrix.target }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
          provenance: mode=max
          sbom: true

  release:
    name: Publish GitHub release
    needs: [artifacts, images]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: routerview-${{ github.ref_name }}-release
          path: release-files
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-files/*
