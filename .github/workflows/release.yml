name: Release

on:
  push:
    tags:
      - "v*"

permissions: {}

jobs:
  tag-provenance:
    name: Verify tag provenance
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false
      - name: Require tag commit on origin/main
        run: |
          test "$GITHUB_REF_TYPE" = "tag"
          git show-ref --verify --quiet refs/remotes/origin/main
          tag_commit="$(git rev-parse --verify 'HEAD^{commit}')"
          if ! git merge-base --is-ancestor "$tag_commit" refs/remotes/origin/main; then
            echo "Tag commit $tag_commit is not reachable from origin/main" >&2
            exit 1
          fi

  dependency-audit:
    name: Dependency audit
    needs: tag-provenance
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # openidconnect 4 uses rsa 0.9 for public-key verification only. RouterView
          # never loads an RSA private key or performs the operations affected here.
          ignore: RUSTSEC-2023-0071
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.24.0
          run_install: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Audit production frontend dependencies
        working-directory: frontend
        run: pnpm audit --prod --audit-level=high

  secret-scan:
    name: Secret scan
    needs: tag-provenance
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Scan complete tagged history
        run: gitleaks detect --source . --redact --verbose

  deployment-validation:
    name: Deployment configuration
    needs: tag-provenance
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      OIDC_ISSUER_URL: https://127.0.0.1:9
      OIDC_CLIENT_ID: routerview-release-validation
      OIDC_CLIENT_SECRET_SOURCE: ./secrets/routerview_oidc_client_secret
      OIDC_PROVIDER_NAME: Example SSO
      OIDC_GROUPS_CLAIM: groups
      OIDC_VIEWER_GROUP: routerview-viewers
      OIDC_ADMIN_GROUP: routerview-admins
      OIDC_ADDITIONAL_SCOPES: groups.read
      OIDC_CA_SOURCE: ./secrets/routerview_oidc_ca.pem
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Create ephemeral build secret
        run: |
          mkdir -p secrets
          head -c 32 /dev/urandom > secrets/routerview_master_key
          openssl rand -base64 48 > secrets/routerview_oidc_client_secret
          cp /etc/ssl/certs/ca-certificates.crt secrets/routerview_oidc_ca.pem
          chmod 0444 secrets/routerview_master_key \
            secrets/routerview_oidc_client_secret \
            secrets/routerview_oidc_ca.pem
      - name: Validate base Compose model
        run: docker compose --env-file .env.compose.example config --quiet
      - name: Validate OIDC Compose model
        run: >-
          docker compose --env-file .env.compose.example
          -f compose.yaml -f compose.oidc.yaml
          config --quiet
      - name: Validate private-CA OIDC Compose model
        run: >-
          docker compose --env-file .env.compose.example
          -f compose.yaml -f compose.oidc.yaml -f compose.oidc-ca.yaml
          config --quiet
      - name: Validate Caddy configuration
        run: >-
          docker run --rm
          -e ROUTERVIEW_DOMAIN=routerview.local
          -v "$PWD/deploy/Caddyfile:/etc/caddy/Caddyfile:ro"
          caddy:2.10.2-alpine
          caddy validate --config /etc/caddy/Caddyfile --adapter caddyfile

  artifacts:
    name: Validate and build amd64 artifacts
    needs: [tag-provenance, dependency-audit, secret-scan, deployment-validation]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: 1.91.1
          components: clippy,rustfmt
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.24.0
          run_install: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Verify release version
        run: |
          cargo metadata --locked --no-deps --format-version 1 > release-cargo-metadata.json
          node scripts/verify-release-version.mjs \
            "$GITHUB_REF_NAME" release-cargo-metadata.json frontend/package.json
          test "$(uname -m)" = "x86_64"
      - name: Verify backend
        run: |
          cargo fmt --all --check
          cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
          cargo test --workspace --all-targets --all-features --locked
          cargo build --locked --release --package routerview-backend
      - name: Verify and build frontend
        working-directory: frontend
        run: |
          pnpm test --run
          pnpm build
      - name: Generate dependency inventory
        run: |
          cargo metadata --locked --format-version 1 > cargo-metadata.json
          pnpm --dir frontend licenses list --json > pnpm-licenses.json
          node scripts/generate-third-party-notices.mjs \
            cargo-metadata.json pnpm-licenses.json THIRD-PARTY-LICENSES.md
      - name: Bundle third-party license texts
        run: |
          pnpm --dir frontend run licenses:test
          pnpm --dir frontend run licenses:release
          test -s release/backend/third-party-licenses/cargo/DEPENDENCIES.md
          test -s release/frontend/third-party-licenses/pnpm/DEPENDENCIES.md
      - name: Assemble release directories
        run: |
          install -d release/backend release/frontend
          install -m 0755 target/release/routerview-backend release/backend/
          cp LICENSE README.md THIRD-PARTY-LICENSES.md release/backend/
          cp -R docs release/backend/docs
          cp -R frontend/dist/. release/frontend/
          cp LICENSE THIRD-PARTY-LICENSES.md release/frontend/
      - name: Generate backend artifact SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: release/backend
          format: spdx-json
          output-file: routerview-backend-${{ github.ref_name }}-linux-amd64.spdx.json
          upload-artifact: false
          upload-release-assets: false
      - name: Generate frontend artifact SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: release/frontend
          format: spdx-json
          output-file: routerview-frontend-${{ github.ref_name }}.spdx.json
          upload-artifact: false
          upload-release-assets: false
      - name: Package artifacts
        run: |
          tar -C release/backend -czf routerview-backend-${{ github.ref_name }}-linux-amd64.tar.gz .
          tar -C release/frontend -czf routerview-frontend-${{ github.ref_name }}.tar.gz .
          sha256sum \
            routerview-backend-${{ github.ref_name }}-linux-amd64.tar.gz \
            routerview-frontend-${{ github.ref_name }}.tar.gz \
            routerview-backend-${{ github.ref_name }}-linux-amd64.spdx.json \
            routerview-frontend-${{ github.ref_name }}.spdx.json \
            THIRD-PARTY-LICENSES.md \
            > SHA256SUMS
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: routerview-${{ github.ref_name }}-release
          if-no-files-found: error
          retention-days: 7
          path: |
            routerview-backend-${{ github.ref_name }}-linux-amd64.tar.gz
            routerview-frontend-${{ github.ref_name }}.tar.gz
            routerview-backend-${{ github.ref_name }}-linux-amd64.spdx.json
            routerview-frontend-${{ github.ref_name }}.spdx.json
            THIRD-PARTY-LICENSES.md
            SHA256SUMS

  image-platforms:
    name: Build ${{ matrix.name }} image (${{ matrix.architecture }})
    needs: artifacts
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: backend
            target: backend-runtime
            image: routerview-backend
            architecture: amd64
            runner: ubuntu-24.04
            runner_architecture: x86_64
          - name: backend
            target: backend-runtime
            image: routerview-backend
            architecture: arm64
            runner: ubuntu-24.04-arm
            runner_architecture: aarch64
          - name: caddy
            target: caddy-runtime
            image: routerview-caddy
            architecture: amd64
            runner: ubuntu-24.04
            runner_architecture: x86_64
          - name: caddy
            target: caddy-runtime
            image: routerview-caddy
            architecture: arm64
            runner: ubuntu-24.04-arm
            runner_architecture: aarch64
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Verify native runner architecture
        env:
          EXPECTED_ARCHITECTURE: ${{ matrix.runner_architecture }}
        run: test "$(uname -m)" = "$EXPECTED_ARCHITECTURE"
      - id: image
        name: Resolve canonical image name
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
        run: echo "name=${IMAGE,,}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: metadata
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}
      - id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: Dockerfile
          target: ${{ matrix.target }}
          platforms: linux/${{ matrix.architecture }}
          labels: ${{ steps.metadata.outputs.labels }}
          outputs: type=image,name=${{ steps.image.outputs.name }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.name }}-${{ matrix.architecture }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}-${{ matrix.architecture }}
          provenance: mode=max
          sbom: true
      - name: Export image digest
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          digest="${IMAGE_DIGEST#sha256:}"
          test "$digest" != "$IMAGE_DIGEST"
          test "${#digest}" -eq 64
          case "$digest" in
            *[!0-9a-f]*)
              echo "Build returned an invalid image digest" >&2
              exit 1
              ;;
          esac
          mkdir -p "${RUNNER_TEMP}/digests"
          touch "${RUNNER_TEMP}/digests/${digest}"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: routerview-${{ github.ref_name }}-${{ matrix.name }}-${{ matrix.architecture }}-digest
          if-no-files-found: error
          overwrite: true
          retention-days: 7
          path: ${{ runner.temp }}/digests/*

  images:
    name: Publish ${{ matrix.name }} image
    needs: image-platforms
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: backend
            image: routerview-backend
          - name: caddy
            image: routerview-caddy
    steps:
      - id: image
        name: Resolve canonical image name
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
        run: echo "name=${IMAGE,,}" >> "$GITHUB_OUTPUT"
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: routerview-${{ github.ref_name }}-${{ matrix.name }}-*-digest
          path: ${{ runner.temp }}/digests
          merge-multiple: true
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: metadata
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}
      - name: Create multi-platform manifest
        working-directory: ${{ runner.temp }}/digests
        env:
          IMAGE: ${{ steps.image.outputs.name }}
          METADATA_JSON: ${{ steps.metadata.outputs.json }}
        run: |
          shopt -s nullglob
          digests=(*)
          test "${#digests[@]}" -eq 2

          sources=()
          for digest in "${digests[@]}"; do
            test -f "$digest"
            test "${#digest}" -eq 64
            case "$digest" in
              *[!0-9a-f]*)
                echo "Digest artifact has an invalid name" >&2
                exit 1
                ;;
            esac
            sources+=("${IMAGE}@sha256:${digest}")
          done

          mapfile -t tags < <(jq --raw-output '.tags[]' <<<"$METADATA_JSON")
          test "${#tags[@]}" -gt 0
          tag_args=()
          for tag in "${tags[@]}"; do
            case "$tag" in
              "${IMAGE}:"*) ;;
              *)
                echo "Metadata returned a tag for an unexpected image" >&2
                exit 1
                ;;
            esac
            tag_args+=(--tag "$tag")
          done

          docker buildx imagetools create "${tag_args[@]}" "${sources[@]}"
      - name: Verify multi-platform manifest
        env:
          IMAGE: ${{ steps.image.outputs.name }}
          METADATA_JSON: ${{ steps.metadata.outputs.json }}
          VERSION: ${{ steps.metadata.outputs.version }}
        run: |
          test -n "$VERSION"
          mapfile -t tags < <(jq --raw-output '.tags[]' <<<"$METADATA_JSON")
          test "${#tags[@]}" -gt 0
          expected_index_hash=""
          version_index=""
          for tag in "${tags[@]}"; do
            index="$(docker buildx imagetools inspect --raw "$tag")"
            index_hash="$(printf '%s' "$index" | sha256sum | cut -d ' ' -f 1)"
            test -n "$index_hash"
            if [[ -z "$expected_index_hash" ]]; then
              expected_index_hash="$index_hash"
            else
              test "$index_hash" = "$expected_index_hash"
            fi
            if [[ "$tag" = "${IMAGE}:${VERSION}" ]]; then
              version_index="$index"
            fi
          done
          test -n "$version_index"

          jq --exit-status '
            . as $index
            | [$index.manifests[]
                | select(.platform.os == "linux")
                | {
                    platform: "\(.platform.os)/\(.platform.architecture)",
                    digest
                  }] as $runtimes
            | [$index.manifests[]
                | select(
                    .annotations["vnd.docker.reference.type"]
                      == "attestation-manifest"
                  )
                | {
                    platform: "\(.platform.os)/\(.platform.architecture)",
                    subject: .annotations["vnd.docker.reference.digest"]
                  }] as $attestations
            | (([$runtimes[].platform] | sort)
                == ["linux/amd64", "linux/arm64"])
              and (($attestations | length) >= 2)
              and all($attestations[]; .platform == "unknown/unknown")
              and (([$attestations[].subject] | unique | sort)
                == ([$runtimes[].digest] | unique | sort))
          ' <<<"$version_index" >/dev/null

  release:
    name: Publish GitHub release
    needs: [artifacts, images]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false
      - name: Generate release notes
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4.8.0
        with:
          version: v2.13.1
          config: cliff.toml
          args: --current --strip header --no-exec --output RELEASE_NOTES.md
      - name: Verify release notes
        run: |
          test -s RELEASE_NOTES.md
          grep -Fq "## ${GITHUB_REF_NAME}" RELEASE_NOTES.md
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: routerview-${{ github.ref_name }}-release
          path: release-files
      - name: Verify release artifact checksums
        working-directory: release-files
        run: sha256sum --check SHA256SUMS
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          body_path: RELEASE_NOTES.md
          fail_on_unmatched_files: true
          files: release-files/*
